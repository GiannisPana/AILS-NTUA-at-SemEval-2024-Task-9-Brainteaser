    <text x="78" y="224">50</text>
    <text x="78" y="164">75</text>
    <text x="78" y="104">100</text>
  </g>
  <line x1="90" y1="340" x2="805" y2="340" stroke="#7b8494" stroke-width="1.5"/>
  <line x1="90" y1="100" x2="90" y2="340" stroke="#7b8494" stroke-width="1.5"/>

  <g font-family="Arial, sans-serif" font-size="12" text-anchor="middle">
