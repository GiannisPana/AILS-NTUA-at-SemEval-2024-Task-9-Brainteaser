    <text x="172" y="112" fill="#172033" font-weight="700">92.0</text>
    <rect x="204" y="143.9" width="44" height="196.1" fill="#1f78d1"/>
    <text x="226" y="137" fill="#172033" font-weight="700">81.7</text>
