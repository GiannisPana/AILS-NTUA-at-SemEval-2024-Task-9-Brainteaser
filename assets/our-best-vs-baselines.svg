  <rect width="860" height="430" fill="#ffffff"/>
  <text x="430" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">SemEval-2024 Task 9 Overall Accuracy</text>
  <text x="430" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#526070">Tables 4 and 5, Overall column</text>
  <g stroke="#d9dee7" stroke-width="1">
    <line x1="90" y1="340" x2="805" y2="340"/>
