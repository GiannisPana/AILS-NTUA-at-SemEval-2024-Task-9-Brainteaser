  <text x="738" y="586" font-size="10" font-weight="600" fill="#dc2626">ChatGPT &#183; 53.5</text>

  <!-- Mistral group: x 160-304 (3 bars) -->
  <g text-anchor="middle">
    <rect x="160" y="519.2" width="44" height="170.8" fill="#2563eb"/>
    <text x="182" y="513" font-size="11" font-weight="700" fill="#18181b">85.4</text>
    <text x="182" y="703" font-size="9" fill="#27272a">r 16</text>
    <text x="182" y="715" font-size="9" fill="#27272a">&#945; 64</text>

    <rect x="210" y="523.4" width="44" height="166.6" fill="#2563eb"/>
    <text x="232" y="517" font-size="11" font-weight="700" fill="#18181b">83.3</text>
    <text x="232" y="703" font-size="9" fill="#27272a">r 128</text>
    <text x="232" y="715" font-size="9" fill="#27272a">&#945; 128</text>

    <rect x="260" y="523.4" width="44" height="166.6" fill="#2563eb"/>
