  <text x="704" y="438" text-anchor="middle" font-size="11" font-weight="600" fill="#71717a">Phi-2</text>

  <!-- ============ WORD PUZZLE PANEL ============ -->
  <text x="80" y="478" font-size="15" font-weight="700" fill="#18181b">Word Puzzle</text>

  <g font-size="10" fill="#71717a">
    <line x1="130" y1="490" x2="900" y2="490" stroke="#e5e7eb" stroke-dasharray="2,2"/>
    <text x="125" y="494" text-anchor="end">100</text>
