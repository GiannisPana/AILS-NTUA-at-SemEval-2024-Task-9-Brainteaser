  <line x1="130" y1="269.6" x2="780" y2="269.6" stroke="#dc2626" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="788" y="273" font-size="10" font-weight="600" fill="#dc2626">ChatGPT &#183; 62.7</text>

