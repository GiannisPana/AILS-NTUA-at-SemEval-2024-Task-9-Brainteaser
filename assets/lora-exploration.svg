    <text x="182" y="225" font-size="11" font-weight="700" fill="#18181b">81.7</text>
    <text x="182" y="408" font-size="9" fill="#27272a">r 128</text>
    <text x="182" y="420" font-size="9" fill="#27272a">&#945; 128</text>

    <rect x="210" y="231.6" width="44" height="163.4" fill="#2563eb"/>
    <text x="232" y="225" font-size="11" font-weight="700" fill="#18181b">81.7</text>
    <text x="232" y="408" font-size="9" fill="#27272a">r 64</text>
    <text x="232" y="420" font-size="9" fill="#27272a">&#945; 128</text>

    <rect x="260" y="231.6" width="44" height="163.4" fill="#2563eb"/>
    <text x="282" y="225" font-size="11" font-weight="700" fill="#18181b">81.7</text>
    <text x="282" y="408" font-size="9" fill="#27272a">r 16</text>
    <text x="282" y="420" font-size="9" fill="#27272a">&#945; 64</text>
  </g>
  <text x="232" y="438" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">Mistral-7B</text>

  <!-- Mixtral group: x 334-378 -->
  <g text-anchor="middle">
    <rect x="334" y="235" width="44" height="160" fill="#0d9488"/>
    <text x="356" y="228" font-size="11" font-weight="700" fill="#18181b">80.0</text>
    <text x="356" y="408" font-size="9" fill="#27272a">r 128</text>
    <text x="356" y="420" font-size="9" fill="#27272a">&#945; 128</text>
