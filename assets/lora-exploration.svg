    <text x="430" y="250" font-size="11" font-weight="700" fill="#18181b">69.2</text>
    <text x="430" y="408" font-size="9" font-weight="600" fill="#9a3412">7B</text>
    <text x="430" y="420" font-size="9" fill="#27272a">r 64, &#945; 128</text>

    <rect x="458" y="266.8" width="44" height="128.2" fill="#ea580c"/>
    <text x="480" y="260" font-size="11" font-weight="700" fill="#18181b">64.1</text>
