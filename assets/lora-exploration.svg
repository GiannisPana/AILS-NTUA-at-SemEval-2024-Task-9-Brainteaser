  <!-- Footer -->
  <text x="480" y="757" text-anchor="middle" font-size="10" fill="#71717a">Source: AILS-NTUA at SemEval-2024 Task 9 (ACL 2024.semeval-1.248), Tables 4 and 5, Overall column. Bar labels show r and &#945; for each LoRA configuration.</text>
</svg>
