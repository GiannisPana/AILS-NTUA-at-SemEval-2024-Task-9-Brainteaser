<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 770" role="img" aria-labelledby="title desc" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title id="title">How LoRA r and alpha shape QLoRA accuracy across model families</title>
  <desc id="desc">Two-panel bar chart of QLoRA configurations from AILS-NTUA SemEval-2024 Task 9 paper Tables 4 and 5. Sentence Puzzle on top, Word Puzzle on bottom. Each bar is one (r, alpha) configuration grouped by model family.</desc>

  <rect width="960" height="770" fill="#fafbfc"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#18181b">How LoRA r and &#945; Shape QLoRA Accuracy</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#52525b">Each bar is one (r, &#945;) configuration; height = overall accuracy from the paper.</text>

  <!-- Explanation box -->
  <rect x="80" y="72" width="800" height="62" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="92" y="92" font-size="12" fill="#1e293b">
    <tspan font-weight="700">r</tspan> — rank of LoRA's trainable low-rank matrices (higher r = more capacity for adaptation).
  </text>
  <text x="92" y="109" font-size="12" fill="#1e293b">
    <tspan font-weight="700">&#945;</tspan> — LoRA scaling factor; adapter's effective contribution scales as &#945; / r.
  </text>
  <text x="92" y="126" font-size="11" font-style="italic" fill="#475569">
    Read across families: Mistral is robust to (r, &#945;) choices; Llama 2 is fragile to &#945;; Phi-2 plateaus regardless of config.
  </text>

  <!-- Legend -->
  <g font-size="11" fill="#27272a">
    <rect x="345" y="146" width="11" height="11" fill="#2563eb"/><text x="362" y="156">Mistral-7B</text>
    <rect x="445" y="146" width="11" height="11" fill="#0d9488"/><text x="462" y="156">Mixtral-8x7B</text>
    <rect x="555" y="146" width="11" height="11" fill="#ea580c"/><text x="572" y="156">Llama 2</text>
    <rect x="625" y="146" width="11" height="11" fill="#71717a"/><text x="642" y="156">Phi-2</text>
  </g>

  <!-- ============ SENTENCE PUZZLE PANEL ============ -->
  <text x="80" y="184" font-size="15" font-weight="700" fill="#18181b">Sentence Puzzle</text>

  <!-- y-axis gridlines and labels (plot area: x 130-900, y 195-395 = 200px for 100%) -->
  <g font-size="10" fill="#71717a">
    <line x1="130" y1="195" x2="900" y2="195" stroke="#e5e7eb" stroke-dasharray="2,2"/>
    <text x="125" y="199" text-anchor="end">100</text>
    <line x1="130" y1="245" x2="900" y2="245" stroke="#e5e7eb" stroke-dasharray="2,2"/>
    <text x="125" y="249" text-anchor="end">75</text>
    <line x1="130" y1="295" x2="900" y2="295" stroke="#e5e7eb" stroke-dasharray="2,2"/>
    <text x="125" y="299" text-anchor="end">50</text>
    <line x1="130" y1="345" x2="900" y2="345" stroke="#e5e7eb" stroke-dasharray="2,2"/>
    <text x="125" y="349" text-anchor="end">25</text>
    <line x1="130" y1="395" x2="900" y2="395" stroke="#475569" stroke-width="1"/>
    <text x="125" y="399" text-anchor="end">0</text>
  </g>
  <text x="68" y="295" text-anchor="middle" transform="rotate(-90 68 295)" font-size="11" fill="#475569">Overall accuracy (%)</text>

