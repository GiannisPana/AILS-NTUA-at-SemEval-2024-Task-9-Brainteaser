    <text x="654" y="272" font-size="11" font-weight="700" fill="#18181b">58.3</text>
    <text x="654" y="408" font-size="9" fill="#27272a">r 64</text>
    <text x="654" y="420" font-size="9" fill="#27272a">&#945; 128</text>

    <rect x="682" y="278.4" width="44" height="116.6" fill="#71717a"/>
